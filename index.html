<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Spesial Buat Wibi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,600;1,400&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #fef2f2, #fce7f3, #e0f2fe);
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .wrapper {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            z-index: 10;
        }

        /* Tombol Start Glowing & Berdenyut */
        .start-btn {
            background: linear-gradient(135deg, #ec4899, #db2777);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(219, 39, 119, 0.4);
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
            font-family: 'Poppins', sans-serif;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 10px 30px rgba(219, 39, 119, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 15px 40px rgba(219, 39, 119, 0.6); }
            100% { transform: scale(1); box-shadow: 0 10px 30px rgba(219, 39, 119, 0.4); }
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.03);
        }

        /* Container Amplop */
        .envelope-container {
            position: relative;
            width: 320px;
            height: 220px;
            margin: 60px auto;
            cursor: pointer;
            perspective: 1000px;
            display: inline-block;
        }

        .envelope {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #f472b6;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            transition: transform 0.5s ease;
        }

        /* Penutup Amplop Atas */
        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 110px solid #db2777;
            transform-origin: top;
            transition: transform 0.5s ease 0.4s;
            z-index: 3;
        }

        /* Lipatan Depan Amplop */
        .envelope-front {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 160px solid #fce7f3;
            border-right: 160px solid #fce7f3;
            border-bottom: 110px solid #fbcfe8;
            top: 110px;
            z-index: 4;
            border-radius: 0 0 12px 12px;
        }

        .envelope-front::before {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-left: 160px solid #fbcfe8;
            border-top: 110px solid transparent;
            left: -160px;
            top: -110px;
        }

        .envelope-front::after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-right: 160px solid #fbcfe8;
            border-top: 110px solid transparent;
            right: -160px;
            top: -110px;
        }

        /* Kertas Surat Premium */
        .letter {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 290px;
            height: 190px;
            background: #ffffff linear-gradient(rgba(24df,243,247,0) 96%, #f3f4f6 96%);
            background-size: 100% 24px;
            border-radius: 8px;
            padding: 25px 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            z-index: 2;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        .letter h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: #be185d;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .letter p {
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            color: #4b5563;
            line-height: 1.4;
            text-align: center;
        }

        /* Efek Animasi Kebuka */
        .envelope-container.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 1;
            transition: transform 0.5s ease;
        }

        .envelope-container.open .letter {
            transform: translateY(-140px);
            z-index: 5;
            height: 240px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: transform 0.8s ease 0.4s, height 0.3s ease 1.2s;
        }

        .hidden {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .instruction {
            margin-top: 30px;
            color: #be185d;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: opacity 0.3s ease;
        }

        /* CSS Efek Hati Melayang */
        .heart {
            position: absolute;
            color: #f472b6;
            font-size: 20px;
            pointer-events: none;
            animation: floatUp 4s linear infinite;
            opacity: 0;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="heart-container"></div>

    <div class="wrapper">
        <div id="start-screen">
            <button class="start-btn" onclick="initWeb()">Klik Untuk Buka Kiriman ✨</button>
        </div>

        <div id="main-screen" class="hidden">
            <div class="envelope-container" id="envelope-box" onclick="openEnvelope()">
                <div class="envelope"></div>
                <div class="envelope-front"></div>
                <div class="letter">
                    <h2>Dear Dedek Wibi guweh,</h2>
                    <p>Baik-baik ya di sana...<br>Jangan lupa makan, tetep semangat harinya! ❤️</p>
                </div>
            </div>
            <p class="instruction" id="tap-text">Tap amplopnya buat buka surat ❤️</p>
        </div>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="musik.mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById('bg-music');

        function initWeb() {
            music.play().then(() => {
                music.pause();
                music.currentTime = 0;
            }).catch(err => console.log("Audio unlocked:", err));

            document.getElementById('start-screen').classList.add('hidden');
            const mainScreen = document.getElementById('main-screen');
            mainScreen.classList.remove('hidden');
            mainScreen.classList.add('fade-in');
        }

        function openEnvelope() {
            const envelope = document.getElementById('envelope-box');
            if(envelope.classList.contains('open')) return;
            
            envelope.classList.add('open');
            document.getElementById('tap-text').style.opacity = '0';

            // Nyalakan musik pas amplop diklik
            music.play().catch(err => {
                music.muted = false;
                music.play();
            });

            // Mulai munculin efek hati berjatuhan setelah amplop dibuka
            setInterval(createHeart, 300);
        }

        // Fungsi pembuat efek hati melayang secara acak
        function createHeart() {
            const container = document.getElementById('heart-container');
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // Variasi bentuk hati atau emoji
            const hearts = ['❤️', '💖', '🌸', '💕', '✨'];
            heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's'; // Antara 3-5 detik
            heart.style.fontSize = Math.random() * 15 + 15 + 'px'; // Ukuran acak 15-30px
            
            container.appendChild(heart);

            // Hapus elemen dari dom setelah animasi selesai biar HP ga nge-lag
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    </script>
</body>
</html>
